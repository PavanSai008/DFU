<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DFU Detector</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h2>DFU Detection</h2>
    <p>Upload an image and enter the patient vitals to review the DFU screening result in a cleaner, centered layout.</p>

    <div class="form-grid">
      <div class="field field-full">
        <label for="image">Foot Image</label>
        <input type="file" id="image">
      </div>

      <div class="field">
        <label for="abi">ABI</label>
        <input type="number" id="abi" placeholder="Enter ABI value">
      </div>

      <div class="field">
        <label for="spo2">SpO2</label>
        <input type="number" id="spo2" placeholder="Enter SpO2">
      </div>

      <div class="field">
        <label for="blood_sugar">Blood Sugar</label>
        <input type="number" id="blood_sugar" placeholder="Enter blood sugar">
      </div>

      <div class="field">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="Enter age">
      </div>

      <div class="field field-full">
        <label for="diabetes_duration">Diabetes Duration</label>
        <input type="number" id="diabetes_duration" placeholder="Enter diabetes duration">
      </div>
    </div>

    <button onclick="analyze()">Analyze</button>

    <div id="result">Result will appear here...</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
